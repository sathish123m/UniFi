services:
  - type: web
    name: unifi-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    buildCommand: npm ci && npm run db:generate
    startCommand: npm run db:prepare:prod && npm run start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false

      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false

      - key: EXPOSE_DEV_OTP
        value: false
      - key: ALLOWED_UNIVERSITY_DOMAINS
        value: lpu.in,rguktn.ac.in
      - key: ALLOWED_UNIVERSITY_DOMAIN
        value: lpu.in

      - key: PAYMENT_PROVIDER
        value: RAZORPAY
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_VERIFY_API
        value: true

      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_REQUIRE_TLS
        value: false
      - key: SMTP_ALLOW_SELF_SIGNED
        value: false
      - key: SMTP_STRICT
        value: true
      - key: SMTP_CONNECTION_TIMEOUT_MS
        value: 12000
      - key: SMTP_GREETING_TIMEOUT_MS
        value: 10000
      - key: SMTP_SOCKET_TIMEOUT_MS
        value: 15000
      - key: SMTP_FROM_NAME
        value: UniFi
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DB_SEED_ON_DEPLOY
        value: true

      - key: SMS_PROVIDER
        value: MOCK
      - key: SMS_STRICT
        value: false

      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: AUTH_RATE_LIMIT_MAX
        value: 10
      - key: OTP_RATE_LIMIT_MAX
        value: 3

      - key: DEFAULT_AFTER_DAYS
        value: 15
      - key: LATE_FEE_PER_DAY_BPS
        value: 50
      - key: MAX_LATE_FEE_PCT
        value: 20
