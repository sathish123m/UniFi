version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: unifi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unifi_db
    ports:
      - '5432:5432'
    volumes:
      - unifi_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: unifi-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - unifi_redis_data:/data

volumes:
  unifi_pg_data:
  unifi_redis_data:
